<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>鬼抓人——地图雷达</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map">
    <canvas id="circle-canvas"></canvas>
  </div>

  <!-- 浮动控制按钮组 -->
  <div class="floating-buttons">
    <button id="gps-btn" class="fab-btn" title="定位到我的位置" aria-label="定位">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
      <span class="pulse-ring"></span>
    </button>
  </div>

  <!-- 底部控制面板 -->
  <div class="bottom-panel" id="bottomPanel">
    <div class="panel-handle">
      <div class="handle-bar"></div>
    </div>

    <!-- GPS 状态条 -->
    <div class="gps-status" id="gps-status">
      <span class="gps-dot"></span>
      <span class="gps-offline">⊙ 未定位，点击 GPS 按钮定位</span>
    </div>

    <div class="panel-header">
      <h1 class="panel-title">鬼抓人——地图雷达</h1>
      <button id="theme-btn" class="theme-toggle" title="切换浅色主题">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>

    <div class="panel-body">
      <!-- 模式切换 -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="click" id="mode-click">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          点击选点
        </button>
        <button class="mode-tab" data-mode="input" id="mode-input">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          输入坐标
        </button>
      </div>

      <!-- 坐标输入区 -->
      <div class="input-section input-group" id="inputGroup">
        <div class="coord-row">
          <div class="coord-field">
            <label for="lat" class="field-label">纬度</label>
            <div class="input-wrap">
              <input type="number" id="lat" class="coord-input" step="any" placeholder="39.916527" inputmode="decimal">
            </div>
          </div>
          <div class="coord-field">
            <label for="lng" class="field-label">经度</label>
            <div class="input-wrap">
              <input type="number" id="lng" class="coord-input" step="any" placeholder="116.397128" inputmode="decimal">
            </div>
          </div>
        </div>
      </div>

      <!-- 点击提示 -->
      <div class="click-hint" id="clickHint">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13s-7-8-7-13a7 7 0 0 1 14 0Z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        点击地图上的任意位置选择中心点
      </div>

      <!-- 智能坐标解析 + 位置标记 -->
      <div class="parse-section">
        <div class="parse-row">
          <div class="parse-input-wrap">
            <input type="text" id="parse-input" class="parse-input" placeholder="粘贴坐标，如：23.1291, 113.2644" enterkeyhint="done">
          </div>
        </div>
        <div class="parse-actions">
          <button id="set-mypos-btn" class="btn-setpos">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            设为我的位置
          </button>
          <button id="copy-mypos-btn" class="btn-setpos btn-copy" title="复制我方经纬度">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制坐标
          </button>
          <button id="target-set-btn" class="btn-setpos btn-target">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            标记对方
          </button>
          <button id="target-clear-btn" class="btn-setpos btn-target-clear" disabled>清除</button>
        </div>
        <div class="target-range-row hidden" id="target-range-row">
          <label class="field-label">精度范围</label>
          <input type="range" id="target-range" class="target-range" min="0" max="5000" value="0" step="10">
          <input type="number" id="target-range-input" class="target-range-input" value="0" min="0" max="5000" step="10" inputmode="numeric">
          <span class="target-range-unit">米</span>
        </div>
        <div class="target-info" id="target-info"></div>
      </div>

      <!-- 半径设置 -->
      <div class="radius-section">
        <div class="radius-header">
          <label class="field-label">半径</label>
          <div class="radius-value-wrap">
            <input type="number" id="radius-input" class="radius-input" value="5000" min="1" max="50000" inputmode="numeric">
            <span class="radius-unit">米</span>
          </div>
        </div>
        <div class="slider-wrap">
          <input type="range" id="radius-slider" class="radius-slider" min="1" max="50000" value="5000" step="1">
          <div class="slider-labels">
            <span>1m</span>
            <span>500m</span>
            <span>1km</span>
            <span>10km</span>
            <span>50km</span>
          </div>
        </div>
        <div class="radius-presets">
          <button class="preset-btn" data-radius="100">100m</button>
          <button class="preset-btn" data-radius="500">500m</button>
          <button class="preset-btn" data-radius="1000">1km</button>
          <button class="preset-btn" data-radius="3000">3km</button>
          <button class="preset-btn" data-radius="5000">5km</button>
          <button class="preset-btn" data-radius="10000">10km</button>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-row">
        <button id="draw-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
          绘制圆形
        </button>
        <button id="clear-btn" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          清除
        </button>
      </div>

      <!-- 轨迹记录 -->
      <div class="trail-section">
        <div class="trail-header">
          <span class="field-label">轨迹记录</span>
          <span class="trail-distance" id="trail-distance">0m</span>
        </div>
        <div class="trail-controls">
          <button id="trail-record-btn" class="btn btn-trail">
            <span class="trail-dot"></span> 开始记录
          </button>
          <button id="trail-clear-btn" class="btn btn-secondary btn-sm" disabled>清除</button>
          <button id="trail-export-btn" class="btn btn-secondary btn-sm" disabled>GPX</button>
        </div>
        <div class="trail-actions">
          <button id="trail-stats-btn" class="btn-sm" disabled>📊 统计</button>
          <button id="trail-smooth-btn" class="btn-sm active">✨ 平滑</button>
        </div>
        <!-- 速度色阶图例 -->
        <div class="speed-legend">
          <span class="speed-legend-item"><i style="background:rgba(80,160,255,0.85)"></i>0-0.5</span>
          <span class="speed-legend-item"><i style="background:rgba(0,212,170,0.9)"></i>0.5-1.5</span>
          <span class="speed-legend-item"><i style="background:rgba(180,200,50,0.9)"></i>1.5-3</span>
          <span class="speed-legend-item"><i style="background:rgba(255,140,40,0.95)"></i>3-5</span>
          <span class="speed-legend-item"><i style="background:rgba(255,60,60,1)"></i>&gt;5 m/s</span>
        </div>
      </div>

      <!-- 圆列表 -->
      <div class="circle-list-section">
        <div class="circle-list-header">
          <span class="field-label">已绘制 (<span id="circle-count">0</span>)</span>
        </div>
        <div class="circle-list" id="circle-list">
          <div class="empty-state">暂无同心圆，点击「绘制圆形」添加</div>
        </div>
      </div>

      <!-- 最近定位 -->
      <div class="fix-list-section">
        <div class="fix-list-header">
          <span class="field-label">最近定位 (<span id="fix-count">0</span>)</span>
        </div>
        <div class="fix-list" id="fix-list">
          <div class="empty-state">暂无定位数据</div>
        </div>
      </div>

      <!-- 信息展示区 -->
      <div class="info-area hidden" id="infoArea">
        <div class="info-divider"></div>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">圆心坐标</span>
            <span class="info-value" id="info-center" style="cursor:pointer" title="点击复制坐标">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">半径</span>
            <span class="info-value" id="info-radius">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">面积</span>
            <span class="info-value accent" id="info-area">--</span>
          </div>
          <div class="info-item">
            <span class="info-label">同心圆</span>
            <span class="info-value" id="info-rings">--</span>
          </div>
          <div class="info-item info-item-dist">
            <span class="info-label">距我位置</span>
            <span class="info-value" id="info-distance">--</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tencent Map API -->
  <script charset="utf-8" src="https://map.qq.com/api/js?v=2.exp&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77&libraries=geometry,convertor"></script>

  <!-- 应用脚本 -->
  <script src="js/config.js?t=20260702v8"></script>
  <script src="js/toast.js?t=20260702v8"></script>
  <script src="js/storage.js?t=20260702v8"></script>
  <script src="js/trail.js?t=20260702v8"></script>
  <script src="js/gpx.js?t=20260702v8"></script>
  <script src="js/map.js?t=20260702v8"></script>
  <script src="js/gps.js?t=20260702v8"></script>
  <script src="js/app.js?t=20260702v8"></script>
</body>
</html>
